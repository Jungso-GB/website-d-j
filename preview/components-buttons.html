<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0b07;padding:24px;font-family:'Open Sans',sans-serif;display:flex;flex-direction:column;gap:20px}
.section-label{font-family:'Cinzel',serif;font-size:9px;color:#8c7b65;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:6px;font-size:0.88rem;font-weight:700;letter-spacing:0.04em;cursor:pointer;border:none;text-decoration:none;transition:all 0.25s ease}
.btn-primary{background:#c9922a;color:#0f0b07}
.btn-primary:hover{background:#e8b84b;box-shadow:0 0 24px rgba(201,146,42,0.45)}
.btn-secondary{background:transparent;color:#e8dcc8;border:1px solid rgba(201,146,42,0.25)}
.btn-secondary:hover{border-color:#c9922a;color:#e8b84b}
.btn-discord{background:#5865F2;color:#fff;display:inline-flex;align-items:center;gap:7px}
.btn-discord:hover{background:#4752c4}
.btn-ghost{background:transparent;border:1px solid #c9922a;color:#e8b84b;padding:7px 18px;font-size:0.82rem}
.btn-ghost:hover{background:#c9922a;color:#0f0b07}
.btn-sm{padding:6px 14px;font-size:0.78rem}
.btn-lg{padding:15px 32px;font-size:1rem}

.state-group{display:flex;flex-direction:column;gap:4px}
.state-label{font-size:9px;color:#5a4d3a;font-family:monospace}
</style></head><body>

<div>
  <div class="section-label">Primary</div>
  <div class="row">
    <div class="state-group"><div class="state-label">default</div><button class="btn btn-primary">⚔ Rejoindre la guilde</button></div>
    <div class="state-group"><div class="state-label">hover</div><button class="btn btn-primary" style="background:#e8b84b;box-shadow:0 0 24px rgba(201,146,42,0.45)">⚔ Rejoindre la guilde</button></div>
  </div>
</div>

<div>
  <div class="section-label">Secondary</div>
  <div class="row">
    <div class="state-group"><div class="state-label">default</div><button class="btn btn-secondary">En savoir plus ↓</button></div>
    <div class="state-group"><div class="state-label">hover</div><button class="btn btn-secondary" style="border-color:#c9922a;color:#e8b84b;box-shadow:0 0 16px rgba(201,146,42,0.2)">En savoir plus ↓</button></div>
  </div>
</div>

<div>
  <div class="section-label">Discord</div>
  <div class="row">
    <button class="btn btn-discord">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028z"/></svg>
      Rejoindre le Discord
    </button>
  </div>
</div>

<div>
  <div class="section-label">Ghost / Sign-up</div>
  <div class="row">
    <div class="state-group"><div class="state-label">default</div><button class="btn btn-ghost">S'inscrire ↗</button></div>
    <div class="state-group"><div class="state-label">hover</div><button class="btn btn-ghost" style="background:#c9922a;color:#0f0b07">S'inscrire ↗</button></div>
  </div>
</div>

<div>
  <div class="section-label">Sizes</div>
  <div class="row" style="align-items:center">
    <button class="btn btn-primary btn-sm">SM · Rejoindre</button>
    <button class="btn btn-primary">MD · Rejoindre</button>
    <button class="btn btn-primary btn-lg">LG · Rejoindre</button>
  </div>
</div>

</body></html>

<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0b07;padding:20px;display:flex;flex-direction:column;gap:20px}
.section-label{font-family:'Cinzel',serif;font-size:9px;color:#8c7b65;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.token{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:#c9922a;width:28px;border-radius:2px 2px 0 0;min-height:4px}
.val{font-size:9px;color:#8c7b65;font-family:monospace;white-space:nowrap}

.radius-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.rbox{width:48px;height:48px;background:#1c1409;border:1px solid rgba(201,146,42,0.4)}
.rlabel{font-size:9px;color:#8c7b65;font-family:monospace;text-align:center;margin-top:4px}

.shadow-row{display:flex;gap:16px;flex-wrap:wrap}
.sbox{width:80px;height:44px;background:#261b0d;border:1px solid rgba(201,146,42,0.25);border-radius:8px;display:flex;align-items:center;justify-content:center}
.slabel{font-size:9px;color:#8c7b65;font-family:'Cinzel',serif;margin-top:6px;text-align:center}
</style></head><body>

<div>
  <div class="section-label">Spacing Scale</div>
  <div class="row">
    <div class="token"><div class="bar" style="height:4px"></div><div class="val">1 · 4px</div></div>
    <div class="token"><div class="bar" style="height:8px"></div><div class="val">2 · 8px</div></div>
    <div class="token"><div class="bar" style="height:12px"></div><div class="val">3 · 12px</div></div>
    <div class="token"><div class="bar" style="height:16px"></div><div class="val">4 · 16px</div></div>
    <div class="token"><div class="bar" style="height:20px"></div><div class="val">5 · 20px</div></div>
    <div class="token"><div class="bar" style="height:24px"></div><div class="val">6 · 24px</div></div>
    <div class="token"><div class="bar" style="height:32px"></div><div class="val">8 · 32px</div></div>
    <div class="token"><div class="bar" style="height:40px"></div><div class="val">10 · 40px</div></div>
    <div class="token"><div class="bar" style="height:48px"></div><div class="val">12 · 48px</div></div>
    <div class="token"><div class="bar" style="height:64px"></div><div class="val">16 · 64px</div></div>
    <div class="token"><div class="bar" style="height:80px"></div><div class="val">20 · 80px</div></div>
  </div>
</div>

<div>
  <div class="section-label">Border Radius</div>
  <div class="radius-row">
    <div class="token"><div class="rbox" style="border-radius:4px"></div><div class="rlabel">sm · 4px</div></div>
    <div class="token"><div class="rbox" style="border-radius:8px"></div><div class="rlabel">md · 8px</div></div>
    <div class="token"><div class="rbox" style="border-radius:12px"></div><div class="rlabel">lg · 12px</div></div>
    <div class="token"><div class="rbox" style="border-radius:20px"></div><div class="rlabel">xl · 20px pill</div></div>
    <div class="token"><div class="rbox" style="border-radius:50%"></div><div class="rlabel">full · avatar</div></div>
  </div>
</div>

<div>
  <div class="section-label">Shadow System</div>
  <div class="shadow-row">
    <div class="token">
      <div class="sbox" style="box-shadow:0 0 12px rgba(201,146,42,0.3)"></div>
      <div class="slabel">Gold<br><span style="font-family:monospace;font-size:8px;color:#5a4d3a">0 0 12px .3</span></div>
    </div>
    <div class="token">
      <div class="sbox" style="box-shadow:0 0 24px rgba(201,146,42,0.45)"></div>
      <div class="slabel">Gold-LG<br><span style="font-family:monospace;font-size:8px;color:#5a4d3a">0 0 24px .45</span></div>
    </div>
    <div class="token">
      <div class="sbox" style="box-shadow:0 0 18px rgba(201,146,42,0.12)"></div>
      <div class="slabel">Card<br><span style="font-family:monospace;font-size:8px;color:#5a4d3a">0 0 18px .12</span></div>
    </div>
    <div class="token">
      <div class="sbox" style="box-shadow:inset 0 1px 0 rgba(201,146,42,0.12)"></div>
      <div class="slabel">Inset<br><span style="font-family:monospace;font-size:8px;color:#5a4d3a">inset 0 1px 0</span></div>
    </div>
  </div>
</div>

</body></html>

<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0b07;font-family:'Open Sans',sans-serif;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.item{background:#1c1409;border-radius:6px;overflow:hidden;border:1px solid rgba(201,146,42,0.15)}
.bar{height:6px}
.content{padding:8px 10px}
.name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.03em;margin-bottom:2px}
.hex{font-size:9px;color:#8c7b65;font-family:monospace}
</style></head><body>
<div class="grid">
  <div class="item"><div class="bar" style="background:#C79C6E"></div><div class="content"><div class="name" style="color:#C79C6E">Guerrier</div><div class="hex">#C79C6E</div></div></div>
  <div class="item"><div class="bar" style="background:#F58CBA"></div><div class="content"><div class="name" style="color:#F58CBA">Paladin</div><div class="hex">#F58CBA</div></div></div>
  <div class="item"><div class="bar" style="background:#ABD473"></div><div class="content"><div class="name" style="color:#ABD473">Chasseur</div><div class="hex">#ABD473</div></div></div>
  <div class="item"><div class="bar" style="background:#FFF569"></div><div class="content"><div class="name" style="color:#FFF569">Voleur</div><div class="hex">#FFF569</div></div></div>
  <div class="item"><div class="bar" style="background:#FFFFFF"></div><div class="content"><div class="name" style="color:#FFFFFF">Prêtre</div><div class="hex">#FFFFFF</div></div></div>
  <div class="item"><div class="bar" style="background:#C41F3B"></div><div class="content"><div class="name" style="color:#C41F3B">Chev. Mort</div><div class="hex">#C41F3B</div></div></div>
  <div class="item"><div class="bar" style="background:#0070DE"></div><div class="content"><div class="name" style="color:#0070DE">Chaman</div><div class="hex">#0070DE</div></div></div>
  <div class="item"><div class="bar" style="background:#69CCF0"></div><div class="content"><div class="name" style="color:#69CCF0">Mage</div><div class="hex">#69CCF0</div></div></div>
  <div class="item"><div class="bar" style="background:#9482C9"></div><div class="content"><div class="name" style="color:#9482C9">Démoniste</div><div class="hex">#9482C9</div></div></div>
  <div class="item"><div class="bar" style="background:#00FF96"></div><div class="content"><div class="name" style="color:#00FF96">Moine</div><div class="hex">#00FF96</div></div></div>
  <div class="item"><div class="bar" style="background:#FF7D0A"></div><div class="content"><div class="name" style="color:#FF7D0A">Druide</div><div class="hex">#FF7D0A</div></div></div>
  <div class="item"><div class="bar" style="background:#A330C9"></div><div class="content"><div class="name" style="color:#A330C9">Chas. Démon</div><div class="hex">#A330C9</div></div></div>
  <div class="item"><div class="bar" style="background:#33937F"></div><div class="content"><div class="name" style="color:#33937F">Évocateur</div><div class="hex">#33937F</div></div></div>
</div>
</body></html>

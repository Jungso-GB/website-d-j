<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0b07;font-family:'Open Sans',sans-serif;padding:20px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.swatch{flex:1;min-width:90px;border-radius:6px;overflow:hidden}
.chip{height:64px;width:100%}
.info{padding:8px 10px;background:#1c1409;border:1px solid rgba(201,146,42,0.2);border-top:none;border-radius:0 0 6px 6px}
.name{font-family:'Cinzel',serif;font-size:10px;color:#e8b84b;letter-spacing:0.05em;margin-bottom:2px}
.hex{font-size:10px;color:#8c7b65;font-family:monospace}
.section-label{font-family:'Cinzel',serif;font-size:9px;color:#8c7b65;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
</style></head><body>
<div class="section-label">Backgrounds</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0f0b07;border:1px solid rgba(201,146,42,0.15)"></div><div class="info"><div class="name">BG</div><div class="hex">#0f0b07</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1c1409"></div><div class="info"><div class="name">Surface</div><div class="hex">#1c1409</div></div></div>
  <div class="swatch"><div class="chip" style="background:#261b0d"></div><div class="info"><div class="name">Surface-2</div><div class="hex">#261b0d</div></div></div>
  <div class="swatch"><div class="chip" style="background:#2f2010"></div><div class="info"><div class="name">Surface-3</div><div class="hex">#2f2010</div></div></div>
  <div class="swatch"><div class="chip" style="background:#0a0704"></div><div class="info"><div class="name">Footer</div><div class="hex">#0a0704</div></div></div>
</div>
<div class="section-label">Gold Scale</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:rgba(201,146,42,0.1)"></div><div class="info"><div class="name">Gold Subtle</div><div class="hex">rgba(201,146,42,.1)</div></div></div>
  <div class="swatch"><div class="chip" style="background:rgba(201,146,42,0.25)"></div><div class="info"><div class="name">Border</div><div class="hex">rgba(201,146,42,.25)</div></div></div>
  <div class="swatch"><div class="chip" style="background:#c9922a"></div><div class="info"><div class="name">Gold</div><div class="hex">#c9922a</div></div></div>
  <div class="swatch"><div class="chip" style="background:#e8b84b"></div><div class="info"><div class="name">Gold Light</div><div class="hex">#e8b84b</div></div></div>
</div>
<div class="section-label">Accents</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#8b1a1a"></div><div class="info"><div class="name">Red</div><div class="hex">#8b1a1a</div></div></div>
  <div class="swatch"><div class="chip" style="background:#c23030"></div><div class="info"><div class="name">Red Light</div><div class="hex">#c23030</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1a3d6b"></div><div class="info"><div class="name">Blue</div><div class="hex">#1a3d6b</div></div></div>
  <div class="swatch"><div class="chip" style="background:#5865F2"></div><div class="info"><div class="name">Discord</div><div class="hex">#5865F2</div></div></div>
</div>
</body></html>
